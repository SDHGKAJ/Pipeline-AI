name: Model Training & Registration

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  
  workflow_dispatch:  # Allow manual triggering
    inputs:
      force_retrain:
        description: 'Force full retraining'
        required: false
        default: 'false'

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Fetch training data from S3
      run: |
        aws s3 cp s3://churn-datalake/processed/ \
          ./data/processed/ --recursive
    
    - name: Run data validation
      run: |
        python -c "
        import sys
        import logging
        logging.basicConfig(level=logging.INFO)
        from src.etl.spark_jobs import DataValidator
        import pandas as pd
        
        # Load data
        df = pd.read_parquet('./data/processed/customer_data.parquet')
        report = DataValidator.check_data_integrity(df)
        
        # Exit with error if critical issues found
        if report['checks']['null_values']['null_percentage'].get('customer_id', 0) > 5:
            sys.exit(1)
        "
    
    - name: Run hyperparameter tuning
      timeout-minutes: 180
      run: |
        python -c "
        import logging
        logging.basicConfig(level=logging.INFO)
        from src.models.model_evaluation import ModelTrainer
        from src.features.feature_engineering import FeatureEngineer
        import pandas as pd
        
        # Load training data
        X = pd.read_parquet('./data/processed/features.parquet')
        y = pd.read_parquet('./data/processed/targets.parquet')
        
        # Train model with tuning
        trainer = ModelTrainer()
        best_model = trainer.train(X, y, tune_hyperparameters=True)
        "
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    - name: Register model to MLflow
      run: |
        python -c "
        import mlflow
        mlflow.set_tracking_uri('${{ secrets.MLFLOW_TRACKING_URI }}')
        # Model is automatically registered during training
        print('Model registered successfully')
        "
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    
    - name: Notify Slack on completion
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "Model training completed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Model training job finished\nStatus: ${{ job.status }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here>"
                }
              }
            ]
          }
    
    - name: Archive training artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: training-artifacts
        path: |
          mlflow_artifacts/
          logs/
