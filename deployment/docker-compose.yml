version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: churn_postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: churn_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: analytics
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: churn_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: churn_kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: churn_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # MLflow Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: churn_mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  # FastAPI Inference Server
  api:
    build:
      context: .
      dockerfile: deployment/Dockerfile
      target: development
    container_name: churn_api
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      MYSQL_HOST: mysql
      KAFKA_BROKERS: kafka:9092
      MLflow_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn src.inference.api_server:app --host 0.0.0.0 --port 8000 --reload

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: churn_prometheus
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: churn_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mysql_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: churn_network

# Usage:
# docker-compose up -d          # Start all services
# docker-compose logs -f api    # View API logs
# docker-compose down           # Stop all services
